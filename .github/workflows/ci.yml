name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Unit tests
        run: go test -v -race -cover ./...

      - name: Integration tests
        run: go test -v -race -timeout 60s ./integration/...

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm test

  e2e-protocol:
    name: E2E Protocol Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Build backend
        run: cd ../../backend && go build -o vote-server ./cmd/server

      - name: Start backend
        run: cd ../../backend && ./vote-server &
        env:
          PORT: "8080"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start"
          exit 1

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run WS protocol tests
        run: npx playwright test ws-protocol.spec.ts
        env:
          SKIP_VITE: "1"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t vote:ci .

      - name: Verify binary runs
        run: docker run --rm -e PORT=0 vote:ci --help 2>&1 || true
