run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - revive
    - gosimple
    - typecheck
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-naming
      - name: error-strings
      - name: error-return
      - name: errorf
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: var-declaration
      - name: var-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: integration/
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
